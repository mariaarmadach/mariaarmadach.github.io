<!DOCTYPE html>

<head>

<title>Maria Armada Churruca — Applied AI · Anthropic</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fafafa;color:#1a1a1a;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem}
.card{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:2.5rem 2rem;max-width:420px;width:100%;box-shadow:0 2px 12px rgba(0,0,0,.06)}

.label{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;display:block}
.input{width:100%;padding:10px 12px;border:1px solid #e5e5e5;border-radius:8px;font-size:14px;font-family:inherit;color:#1a1a1a;outline:none;transition:border-color .15s;margin-bottom:1rem}

.footer{margin-top:1.5rem;font-size:11px;color:#ccc;text-align:center}
</style>
</head>
<body>
<div class="card">
  <div class="name">Maria Armada Churruca</div>
  <div class="role">Applied AI · Anthropic</div>

  <form action="https://formspree.io/f/xbdewkqy" method="POST">
    <input type="hidden" name="_next" value="https://mariaarmadach.github.io/cv-anthropic.html">

    <label class="label" for="name">Your name</label>
    <input class="input" type="text" id="name" name="name" placeholder="Jane Smith" required>

    <label class="label" for="email">Your email</label>
    <input class="input" type="email" id="email" name="email" placeholder="jane@anthropic.com" required>

    <button class="submit" type="submit">View CV →</button>

</div>
