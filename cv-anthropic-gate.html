<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maria Armada Churruca — Applied AI · Anthropic</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:1.5rem;
  background:url('8b540c2b67ae3453f25e3fee5960ed93.jpg') center center / cover no-repeat fixed;
  color:#1a1a1a;
}
.card{
  background:rgba(255,255,255,0.55);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,0.7);
  border-radius:16px;
  padding:2.5rem 2rem;
  max-width:420px;
  width:100%;
  box-shadow:0 8px 40px rgba(20,60,120,0.12);
}
.name{font-size:20px;font-weight:600;color:#1a1a1a;margin-bottom:4px}
.role{font-size:13px;color:#185FA5;margin-bottom:1.75rem;padding-bottom:1.75rem;border-bottom:1px solid rgba(24,95,165,0.2)}
.label{font-size:11px;font-weight:600;color:#666;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;display:block}
.input{
  width:100%;
  padding:10px 12px;
  border:1px solid rgba(255,255,255,0.6);
  border-radius:8px;
  font-size:14px;
  font-family:inherit;
  color:#1a1a1a;
  outline:none;
  transition:border-color .15s, background .15s;
  margin-bottom:1rem;
  background:rgba(255,255,255,0.6);
}
.input:focus{border-color:#185FA5;background:rgba(255,255,255,0.85)}
.input::placeholder{color:#aaa}
.submit{
  width:100%;
  padding:11px;
  background:#185FA5;
  color:#fff;
  border:none;
  border-radius:8px;
  font-size:14px;
  font-weight:600;
  font-family:inherit;
  cursor:pointer;
  transition:background .15s;
  margin-top:.25rem;
}
.submit:hover{background:#0C447C}
.footer{margin-top:1.5rem;font-size:11px;color:#999;text-align:center}
.error{font-size:11px;color:#c0392b;margin-top:-10px;margin-bottom:10px;display:none}
.input.invalid{border-color:#c0392b}
</style>
</head>
<body>
<div class="card">
  <div class="name">Maria Armada Churruca</div>
  <div class="role">Applied AI · Anthropic</div>

  <form action="https://formspree.io/f/xbdewkqy" method="POST">
    <input type="hidden" name="_next" value="https://mariaarmadach.github.io/cv-anthropic.html">
    <input type="hidden" name="_subject" value="CV access — Anthropic Applied AI">

    <label class="label" for="name">Your name</label>
    <input class="input" type="text" id="name" name="name" placeholder="Jane Smith">
    <div class="error" id="name-error">Please enter your name.</div>

    <label class="label" for="email">Your email</label>
    <input class="input" type="email" id="email" name="email" placeholder="jane@anthropic.com">
    <div class="error" id="email-error">Please enter a valid email.</div>

    <button class="submit" type="button" onclick="submit()">View CV →</button>
  </form>

  <div class="footer">Your details are only used to know who's viewing this CV.</div>
</div>
<script>
function submit(){
  const nameEl=document.getElementById('name');
  const emailEl=document.getElementById('email');
  const nameErr=document.getElementById('name-error');
  const emailErr=document.getElementById('email-error');
  let valid=true;

  if(!nameEl.value.trim()){
    nameEl.classList.add('invalid');
    nameErr.style.display='block';
    valid=false;
  } else {
    nameEl.classList.remove('invalid');
    nameErr.style.display='none';
  }

  const emailOk=/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailEl.value);
  if(!emailOk){
    emailEl.classList.add('invalid');
    emailErr.style.display='block';
    valid=false;
  } else {
    emailEl.classList.remove('invalid');
    emailErr.style.display='none';
  }

  if(valid) nameEl.closest('form').submit();
}
</script>
</body>
</html>
